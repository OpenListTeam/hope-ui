name: Build and Test Hope UI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ./packages/solid
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/solid/dist/

  publish-dist:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: /tmp/dist

      - name: Collect release files
        run: |
          cp packages/solid/package.json /tmp/dist/
          cp packages/solid/README.md /tmp/dist/ 2>/dev/null || true
          cp LICENSE.md /tmp/dist/ 2>/dev/null || true

      - name: Checkout dist branch
        run: |
          if git ls-remote --exit-code origin dist; then
            git checkout dist
          else
            git checkout --orphan dist
            git rm -rf .
          fi

      - name: Update files
        run: |
          git rm -rf . || true
          cp -r /tmp/dist/* .

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: ${{ github.ref_name }}"
          git push origin dist
